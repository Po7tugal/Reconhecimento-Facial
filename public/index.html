<!DOCTYPE html>

<html>


<head>


  <meta charset="UTF-8">


  <title>Reconhecimento Facial Alunos</title>

  <link rel="stylesheet" href="index.css">

</head>


<body>
  <div class="foto">
    <img src="images/deadpool_man.png" class="borrada" />

    <div id="censura" class="censura">
      Conteúdo sensível
    </div>
  </div>

  <div>
    <button class="botao-ver" onclick="aviso()">Ver Imagem</button>

    <div id="popup" class="popup">
      <div class="box">
        <p>Verificar que tem idade suficiente?</p>

        <button class="botao-confirmar" onclick="confirmar()">Confirmar</button>
        <button class="botao-fechar" onclick="fechar()">Cancelar</button>
      </div>
    </div>

    <script>
      function aviso() {
        document.getElementById("popup").style.display = "flex";
      }

      function fechar() {
        document.getElementById("popup").style.display = "none";
      }

      function confirmar() {
        window.location.href = "verificacao.html";
      }

      window.onload = function () {
        const liberado = sessionStorage.getItem("adulto");

        if (liberado === "true") {
          document.getElementById("censura").style.display = "none";
          document.querySelector(".foto img").classList.remove("borrada");
        }
      };
    </script>
  </div>
</body>


</html>
