<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação de Idade</title>
  <link rel="stylesheet" href="verificacao.css">
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
</head>
<body>

  <header>
    <h1>Reconhecimento Facial</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="imagemReconhecimento.html">Reconhecimento Idade</a></li>
      <li><a href="volumeInterativo.html">Volume Interativo</a></li>
      <li><a href="elementos.html">Elementos</a></li>
    </ul>
  </header>

  <h2>Verificação de Idade</h2>

  <div class="card">

    <video id="video" autoplay muted></video>

    <p class="status">Estado: <span id="statusTxt">A carregar modelos...</span></p>

    <button class="btn" onclick="capturar()">Capturar Foto</button>

  </div>

  <script>
    const video = document.getElementById("video");
    const statusTxt = document.getElementById("statusTxt");

    // Carrega os modelos necessários da face-api
    async function carregarModelos() {
      await faceapi.nets.ssdMobilenetv1.loadFromUri("/models");
      await faceapi.nets.faceLandmark68Net.loadFromUri("/models");
      await faceapi.nets.faceRecognitionNet.loadFromUri("/models");
      await faceapi.nets.faceExpressionNet.loadFromUri("/models");
      await faceapi.nets.ageGenderNet.loadFromUri("/models");

      statusTxt.textContent = "Modelos prontos";
    }

    // Liga a câmara
    async function ligarCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      statusTxt.textContent = "Câmara pronta — clica em Capturar";
    }

    // Captura a imagem e analisa o rosto
    async function capturar() {
      statusTxt.textContent = "A analisar...";

      const detecoes = await faceapi
        .detectAllFaces(video)
        .withFaceLandmarks()
        .withFaceExpressions()
        .withAgeAndGender();

      if (detecoes.length === 0) {
        alert("Nenhum rosto detetado. Tenta de novo.");
        statusTxt.textContent = "Sem rosto detetado";
        return;
      }

      const rosto = detecoes[0];
      const idade = Math.round(rosto.age);
      const adulto = idade >= 18;

      // Guarda o resultado na sessão
      sessionStorage.setItem("adulto", adulto ? "true" : "false");

      alert(
        "Idade estimada: " + idade + " anos\n" +
        "Resultado: " + (adulto ? "Maior de idade ✓" : "Menor de idade ✗")
      );

      // Redireciona consoante o resultado
      if (adulto) {
        window.location.href = "imagemReconhecimento.html";
      } else {
        window.location.href = "index.html";
      }
    }

    // Inicia tudo
    async function init() {
      await carregarModelos();
      await ligarCamera();
    }

    init();
  </script>

</body>
</html>
